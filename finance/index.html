<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="../kb-core.css">
    <style>
        /* ---- 财经模块专用样式 ---- */
        .finance-header {
            text-align: center;
            padding: var(--sp-8) 0 var(--sp-2);
        }
        .finance-icon { font-size: 48px; margin-bottom: var(--sp-3); }
        .finance-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: var(--sp-1);
        }
        .finance-subtitle {
            font-size: 13px;
            color: var(--kb-text-sec);
        }

        /* ---- Tab 导航 ---- */
        .tab-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 11, 26, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--kb-border);
            margin: 0 calc(-1 * var(--sp-4));
            padding: 0 var(--sp-4);
        }
        .tab-bar {
            display: flex;
            gap: var(--sp-1);
            padding: var(--sp-3) 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            color: var(--kb-text-sec);
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn:active { transform: scale(0.96); }
        .tab-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.15);
        }
        .tab-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            padding: 0 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            color: var(--kb-text-muted);
        }
        .tab-btn.active .tab-count {
            background: rgba(52,152,219,0.25);
            color: #3498db;
        }

        /* ---- 筛选栏 ---- */
        .filter-bar {
            display: flex;
            gap: var(--sp-3);
            padding: var(--sp-3) 0 var(--sp-2);
            align-items: center;
        }
        .search-box {
            flex: 1;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border-radius: 12px;
            border: 1px solid var(--kb-border);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            min-height: 44px;
            box-sizing: border-box;
        }
        .search-input::placeholder { color: var(--kb-text-muted); }
        .search-input:focus {
            border-color: rgba(52,152,219,0.5);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--kb-text-muted);
            font-size: 14px;
            pointer-events: none;
        }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: var(--kb-text-muted);
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
        }
        .search-clear.visible { display: flex; }

        .year-filters {
            display: flex;
            gap: var(--sp-1);
            flex-shrink: 0;
        }
        .year-btn {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--kb-text-sec);
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            min-height: 44px;
            -webkit-tap-highlight-color: transparent;
        }
        .year-btn:active { transform: scale(0.96); }
        .year-btn.active {
            color: #fff;
            background: rgba(243,156,18,0.15);
            border-color: rgba(243,156,18,0.3);
        }

        /* ---- 结果统计 ---- */
        .result-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-2) 0;
            font-size: 12px;
            color: var(--kb-text-muted);
        }
        .result-count span { color: var(--kb-text-sec); font-weight: 600; }
        .sort-btn {
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
            color: var(--kb-text-sec);
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .sort-btn:active { transform: scale(0.96); }

        /* ---- 报告列表 ---- */
        .report-list {
            padding-bottom: var(--sp-4);
        }
        .report-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: var(--kb-radius-sm);
            padding: var(--sp-4);
            margin-bottom: var(--sp-2);
            transition: all 0.2s ease;
        }
        .report-card:active { transform: scale(0.98); }
        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--sp-2);
            gap: var(--sp-2);
        }
        .report-card-left { flex: 1; min-width: 0; }
        .report-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .report-date {
            font-size: 12px;
            color: var(--kb-text-muted);
            margin-top: 4px;
        }
        .report-badge {
            flex-shrink: 0;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .report-badge.weekly { background: rgba(52,152,219,0.15); color: #3498db; }
        .report-badge.monthly { background: rgba(155,89,182,0.15); color: #9b59b6; }
        .report-summary {
            font-size: 13px;
            color: var(--kb-text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .report-arrow {
            position: absolute;
            right: var(--sp-4);
            bottom: var(--sp-4);
            color: var(--kb-text-muted);
            font-size: 14px;
            opacity: 0.5;
        }

        /* ---- 分组标题 ---- */
        .group-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--kb-text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: var(--sp-4) 0 var(--sp-2);
            border-bottom: 1px solid var(--kb-border);
            margin-bottom: var(--sp-2);
        }
        .group-title:first-child { padding-top: 0; }

        /* ---- 空状态 ---- */
        .empty-state {
            text-align: center;
            padding: var(--sp-12) var(--sp-4);
            color: var(--kb-text-muted);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: var(--sp-3); opacity: 0.3; }
        .empty-state-text { font-size: 14px; line-height: 1.6; }
        .empty-state-hint { font-size: 12px; margin-top: var(--sp-2); opacity: 0.6; }

        /* ---- 市场概览 ---- */
        .market-overview {
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: var(--kb-radius);
            padding: var(--sp-4);
            margin: var(--sp-4) 0;
        }
        .market-overview-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--kb-text-muted);
            letter-spacing: 2px;
            margin-bottom: var(--sp-3);
        }
        .index-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--sp-3);
        }
        .index-item {
            padding: var(--sp-3);
            background: rgba(255,255,255,0.03);
            border-radius: var(--kb-radius-xs);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .index-name { font-size: 12px; color: var(--kb-text-sec); margin-bottom: 2px; }
        .index-value { font-size: 18px; font-weight: 700; color: #fff; }
        .index-change { font-size: 12px; font-weight: 600; margin-top: 2px; }
        .index-change.up { color: #e74c3c; }
        .index-change.down { color: #16a085; }
        .index-change.flat { color: var(--kb-text-muted); }

        /* ---- 主题聚焦 ---- */
        .theme-section {
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: var(--kb-radius);
            padding: var(--sp-4);
            margin: var(--sp-6) 0;
        }
        .theme-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--kb-text-muted);
            letter-spacing: 2px;
            margin-bottom: var(--sp-3);
        }
        .theme-desc {
            font-size: 13px;
            color: var(--kb-text-sec);
            line-height: 1.7;
        }
        .theme-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-2);
            margin-top: var(--sp-3);
        }
        .theme-tag {
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ---- 返回 ---- */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-1);
            color: var(--kb-text-sec);
            text-decoration: none;
            font-size: 14px;
            padding: var(--sp-3) 0;
            transition: var(--kb-transition);
        }
        .back-link:active { color: #fff; }

        /* ---- 动画 ---- */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate { opacity: 0; animation: fade-up 0.3s ease forwards; }

        /* ---- 响应式 ---- */
        @media (min-width: 640px) {
            .index-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

        renderTabs();
        renderYearFilters();
        bindEvents();
        update();
    }

    // ============ 渲染 Tab ============
    function renderTabs() {
        const bar = document.getElementById('tabBar');
        bar.innerHTML = TABS.map(t => {
            const count = t.key === 'all'
                ? REPORTS.length
                : REPORTS.filter(r => r.type === t.key).length;
            const active = currentTab === t.key ? ' active' : '';
            return '<button class="tab-btn' + active + '" data-tab="' + t.key + '">'
                + t.label
                + '<span class="tab-count">' + count + '</span>'
                + '</button>';
        }).join('');
    }

    // ============ 渲染年份 ============
    function renderYearFilters() {
        const container = document.getElementById('yearFilters');
        const years = [...new Set(REPORTS.map(r => r.year))].sort((a, b) => b - a);
        let html = '<button class="year-btn' + (currentYear === 0 ? ' active' : '') + '" data-year="0">全部</button>';
        years.forEach(y => {
            html += '<button class="year-btn' + (currentYear === y ? ' active' : '') + '" data-year="' + y + '">' + y + '</button>';
        });
        container.innerHTML = html;
    }

    // ============ 绑定事件 ============
    function bindEvents() {
        // Tab 点击
        document.getElementById('tabBar').addEventListener('click', function(e) {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            currentTab = btn.dataset.tab;
            renderTabs();
            update();
        });

        // 年份点击
        document.getElementById('yearFilters').addEventListener('click', function(e) {
            const btn = e.target.closest('.year-btn');
            if (!btn) return;
            currentYear = parseInt(btn.dataset.year);
            renderYearFilters();
            update();
        });

        // 搜索
        const input = document.getElementById('searchInput');
        const clearBtn = document.getElementById('searchClear');
        let debounceTimer;

        input.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const val = this.value;
            clearBtn.classList.toggle('visible', val.length > 0);
            debounceTimer = setTimeout(function() {
                searchQuery = val.trim().toLowerCase();
                update();
            }, 200);
        });

        clearBtn.addEventListener('click', function() {
            input.value = '';
            searchQuery = '';
            clearBtn.classList.remove('visible');
            input.focus();
            update();
        });

        // 排序切换
        document.getElementById('sortBtn').addEventListener('click', function() {
            sortAsc = !sortAsc;
            this.innerHTML = sortAsc ? '&#8593; 最早优先' : '&#8595; 最新优先';
            update();
        });

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + K 聚焦搜索
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                input.focus();
                input.select();
            }
            // Esc 清空搜索
            if (e.key === 'Escape' && document.activeElement === input) {
                input.value = '';
                searchQuery = '';
                clearBtn.classList.remove('visible');
                input.blur();
                update();
            }
        });
    }

    // ============ 筛选 + 排序 ============
    function getFiltered() {
        let list = REPORTS.slice();

        // Tab 筛选
        if (currentTab !== 'all') {
            list = list.filter(r => r.type === currentTab);
        }

        // 年份筛选
        if (currentYear !== 0) {
            list = list.filter(r => r.year === currentYear);
        }

        // 搜索
        if (searchQuery) {
            list = list.filter(r =>
                r.title.toLowerCase().includes(searchQuery) ||
                r.summary.toLowerCase().includes(searchQuery) ||
                r.date.toLowerCase().includes(searchQuery)
            );
        }

        // 排序（按 date 字段自然排序）
        list.sort((a, b) => {
            const cmp = a.date > b.date ? 1 : a.date < b.date ? -1 : 0;
            return sortAsc ? cmp : -cmp;
        });

        return list;
    }

    // ============ 渲染报告列表 ============
    function update() {
        const filtered = getFiltered();
        const container = document.getElementById('reportList');
        const countEl = document.getElementById('countNum');

        countEl.textContent = filtered.length;

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">'
                + '<div class="empty-state-icon">&#128221;</div>'
                + '<div class="empty-state-text">没有找到匹配的报告</div>'
                + '<div class="empty-state-hint">试试切换 Tab 或更换关键词</div>'
                + '</div>';
            return;
        }

        // 按类型分组显示（仅在"全部"Tab下分组）
        if (currentTab === 'all') {
            container.innerHTML = renderGrouped(filtered);
        } else {
            container.innerHTML = renderCards(filtered);
        }
    }

    function renderGrouped(list) {
        const groups = [
            { type: 'monthly', label: '月度趋势分析' },
            { type: 'weekly',  label: '每周市场总结' },
            { type: 'daily',   label: '每日信息简报' }
        ];
        let html = '';
        groups.forEach(g => {
            const items = list.filter(r => r.type === g.type);
            if (items.length === 0) return;
            html += '<div class="group-title">' + g.label + ' (' + items.length + ')</div>';
            html += renderCards(items);
        });
        return html;
    }

    function renderCards(items) {
        return items.map(function(r, i) {
            const delay = Math.min(i * 0.03, 0.3);
            return '<a class="report-card animate" href="' + r.path + '" style="animation-delay:' + delay + 's">'
                + '<div class="report-card-header">'
                + '<div class="report-card-left">'
                + '<div class="report-title">' + r.title + '</div>'
                + '<div class="report-date">' + formatDate(r) + '</div>'
                + '</div>'
                + '<span class="report-badge ' + r.type + '">' + TYPE_LABELS[r.type] + '</span>'
                + '</div>'
                + (r.summary ? '<div class="report-summary">' + r.summary + '</div>' : '')
                + '</a>';
        }).join('');
    }

    function formatDate(r) {
        if (r.type === 'monthly') {
            // 2026-05 → 2026年05月
            return r.date.replace('-', '年') + '月';
        }
        if (r.type === 'weekly') {
            // 2026-W22 → 2026年第22周
            return r.date.replace('W', '年第') + '周';
        }
        // daily: 直接显示
        return r.date;
    }

    // 启动
    init();
})();
</script>
