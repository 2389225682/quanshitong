<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0b1a">
    <title>财经观察 | 飞飞的知识库</title>
    <link rel="icon" type="image/png" href="../icons/icon-192.png">
    <link rel="stylesheet" href="../kb-core.css">
    <style>
        /* ---- 财经模块专用样式 ---- */
        .finance-header {
            text-align: center;
            padding: var(--sp-8) 0 var(--sp-2);
        }
        .finance-icon { font-size: 48px; margin-bottom: var(--sp-3); }
        .finance-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: var(--sp-1);
        }
        .finance-subtitle {
            font-size: 13px;
            color: var(--kb-text-sec);
        }
        
        /* 市场概览卡片 */
        .market-overview {
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: var(--kb-radius);
            padding: var(--sp-4);
            margin: var(--sp-4) 0;
        }
        .market-overview-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--kb-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: var(--sp-3);
        }
        .index-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--sp-3);
        }
        .index-item {
            padding: var(--sp-3);
            background: rgba(255,255,255,0.03);
            border-radius: var(--kb-radius-xs);
            border: 1px solid rgba(255,255,255,0.04);
        }
        .index-name {
            font-size: 12px;
            color: var(--kb-text-sec);
            margin-bottom: 2px;
        }
        .index-value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .index-change {
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
        }
        .index-change.up { color: #e74c3c; } /* 红涨 */
        .index-change.down { color: #16a085; } /* 绿跌 */
        .index-change.flat { color: var(--kb-text-muted); }
        
        /* 报告列表 */
        .report-section {
            margin: var(--sp-6) 0;
        }
        .report-section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--kb-text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: var(--sp-3);
            padding-left: var(--sp-1);
        }
        .report-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: var(--kb-radius-sm);
            padding: var(--sp-4);
            margin-bottom: var(--sp-2);
            transition: var(--kb-transition);
        }
        .report-card:active { transform: scale(0.98); }
        .report-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--sp-2);
        }
        .report-date {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .report-badge {
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
        }
        .report-badge.daily { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .report-badge.weekly { background: rgba(52,152,219,0.15); color: #3498db; }
        .report-badge.monthly { background: rgba(155,89,182,0.15); color: #9b59b6; }
        .report-summary {
            font-size: 13px;
            color: var(--kb-text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .report-highlights {
            display: flex;
            gap: var(--sp-3);
            margin-top: var(--sp-2);
            flex-wrap: wrap;
        }
        .report-highlight {
            font-size: 12px;
            color: var(--kb-text-sec);
        }
        .report-highlight strong { color: #fff; }

        /* 空状态 */
        .empty-reports {
            text-align: center;
            padding: var(--sp-10) var(--sp-4);
            color: var(--kb-text-muted);
        }
        .empty-reports-icon { font-size: 48px; margin-bottom: var(--sp-3); opacity: 0.4; }
        .empty-reports-text { font-size: 14px; line-height: 1.6; }
        
        /* 返回按钮 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--sp-1);
            color: var(--kb-text-sec);
            text-decoration: none;
            font-size: 14px;
            padding: var(--sp-3) 0;
            transition: var(--kb-transition);
        }
        .back-link:active { color: #fff; }
        
        /* 动画 */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate { opacity: 0; animation: fade-up 0.4s ease forwards; }
        .animate:nth-child(1) { animation-delay: 0.05s; }
        .animate:nth-child(2) { animation-delay: 0.1s; }
        .animate:nth-child(3) { animation-delay: 0.15s; }
        .animate:nth-child(4) { animation-delay: 0.2s; }
        .animate:nth-child(5) { animation-delay: 0.25s; }
        .animate:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
<div class="kb-app" id="app">

    <a href="../index.html" class="back-link">← 返回知识库</a>

    <!-- 模块头部 -->
    <header class="finance-header animate">
        <div class="finance-icon">📈</div>
        <h1 class="finance-title">财经观察</h1>
        <p class="finance-subtitle">每周/每月，追踪市场脉搏</p>
    </header>

    <!-- 市场概览 -->
    <div class="market-overview animate" id="marketOverview">
        <div class="market-overview-title">📊 核心指数</div>
        <div class="index-grid" id="indexGrid">
            <!-- JS 动态渲染 -->
            <div class="index-item">
                <div class="index-name">上证指数</div>
                <div class="index-value">--</div>
                <div class="index-change flat">加载中</div>
            </div>
            <div class="index-item">
                <div class="index-name">科创50</div>
                <div class="index-value">--</div>
                <div class="index-change flat">加载中</div>
            </div>
            <div class="index-item">
                <div class="index-name">创业板指</div>
                <div class="index-value">--</div>
                <div class="index-change flat">加载中</div>
            </div>
            <div class="index-item">
                <div class="index-name">沪深300</div>
                <div class="index-value">--</div>
                <div class="index-change flat">加载中</div>
            </div>
        </div>
    </div>

    <!-- 月报区域 -->
    <div class="report-section" id="monthlySection">
        <div class="report-section-title">📋 月度趋势分析</div>
        <div id="monthlyList"></div>
    </div>

    <!-- 周报区域 -->
    <div class="report-section" id="weeklySection">
        <div class="report-section-title">📰 每周市场总结</div>
        <div id="weeklyList"></div>
    </div>

    <!-- 日报区域 -->
    <div class="report-section" id="dailySection">
        <div class="report-section-title">🔥 每日信息简报</div>
        <div id="dailyList"></div>
    </div>

    <!-- 主题聚焦 -->
    <div class="report-section">
        <div class="report-section-title">🎯 主题聚焦 · 半导体国产替代</div>
        <div class="market-overview animate" style="margin-top:0">
            <p style="font-size:13px;color:var(--kb-text-sec);line-height:1.7">
                聚焦半导体产业链国产化进程：从设计（EDA/IP）、制造（晶圆代工）、封测到设备材料，
                追踪关键技术突破与政策动向。核心标的覆盖科创板与主板半导体板块。
            </p>
            <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2);margin-top:var(--sp-3)">
                <span style="padding:3px 10px;border-radius:8px;font-size:11px;background:rgba(231,76,60,0.12);color:#e74c3c">EDA/IP</span>
                <span style="padding:3px 10px;border-radius:8px;font-size:11px;background:rgba(52,152,219,0.12);color:#3498db">晶圆代工</span>
                <span style="padding:3px 10px;border-radius:8px;font-size:11px;background:rgba(155,89,182,0.12);color:#9b59b6">封装测试</span>
                <span style="padding:3px 10px;border-radius:8px;font-size:11px;background:rgba(26,188,156,0.12);color:#1abc9c">设备材料</span>
                <span style="padding:3px 10px;border-radius:8px;font-size:11px;background:rgba(243,156,18,0.12);color:#f39c12">功率半导体</span>
            </div>
        </div>
    </div>

    <footer class="kb-footer" style="margin-top:var(--sp-8)">
        飞飞的知识库 · 财经观察<br>
        <a href="../index.html">← 返回知识库</a>
    </footer>
</div>

<script>
(function() {
    'use strict';

    // 报告数据（由自动化脚本维护，新报告追加到数组头部）
    const REPORTS = [
        // ---- 月报 ----
        { date: '2026年05月', type: 'monthly', title: '2026年5月 月度投资报告', summary: '科创50月涨+11.47%领涨全球，DeepSeek 500亿估值创纪录，月末科技股巨震', path: 'monthly/2026-05.html' },
        { date: '2026年04月', type: 'monthly', title: '2026年4月投资参考报告', summary: 'A股四月强势反弹，沪指站上4100点，科创50单月涨超10%', path: 'monthly/2026-04.html' },
        { date: '2026年03月', type: 'monthly', title: '2026年3月投资参考报告', summary: '两会行情引领反弹，政策预期升温', path: 'monthly/2026-03.html' },
        { date: '2026年02月', type: 'monthly', title: '2026年2月投资月报', summary: '春节后市场回暖，AI概念持续活跃', path: 'monthly/2026-02.html' },
        { date: '2026年01月', type: 'monthly', title: '2026年1月月度投资参考报告', summary: '年初调整，DeepSeek引爆AI主题', path: 'monthly/2026-01.html' },
        { date: '2025年12月', type: 'monthly', title: '2025年12月月度投资参考报告', summary: '年末收官，创业板全年涨近50%领涨全球', path: 'monthly/2025-12.html' },
        { date: '2025年11月', type: 'monthly', title: '2025年11月月度投资报告', summary: '', path: 'monthly/2025-11.html' },
        { date: '2025年10月', type: 'monthly', title: '2025年10月月度投资参考报告', summary: '', path: 'monthly/2025-10.html' },
        { date: '2025年09月', type: 'monthly', title: '2025年9月月度投资参考报告', summary: '数据截至2025年9月30日', path: 'monthly/2025-09.html' },
        { date: '2025年08月', type: 'monthly', title: '2025年8月月度投资参考报告', summary: '报告期间：2025年8月1日 - 8月31日', path: 'monthly/2025-08.html' },
        { date: '2025年07月', type: 'monthly', title: '2025年7月月度投资参考报告', summary: '东方财富、新浪财经数据', path: 'monthly/2025-07.html' },
        { date: '2025年06月', type: 'monthly', title: '2025年6月月度投资参考报告', summary: '', path: 'monthly/2025-06.html' },
        { date: '2025年05月', type: 'monthly', title: '2025年5月月度投资参考报告', summary: '', path: 'monthly/2025-05.html' },
        { date: '2025年04月', type: 'monthly', title: '2025年4月月度投资参考报告', summary: '报告期间：2025年4月1日 - 4月30日', path: 'monthly/2025-04.html' },
        { date: '2025年03月', type: 'monthly', title: '2025年3月月度投资参考报告', summary: '报告日期：2025年3月31日', path: 'monthly/2025-03.html' },
        { date: '2025年02月', type: 'monthly', title: '2025年2月月度投资参考报告', summary: '', path: 'monthly/2025-02.html' },
        { date: '2025年01月', type: 'monthly', title: '2025年1月月度投资参考报告', summary: '', path: 'monthly/2025-01.html' },
        // ---- 周报 ----
        { date: '2026-W22', type: 'weekly', title: '每周信息总结与投资参考（2026-W22）', summary: '5/26-5/29：A股冲高回落，科创50从高位回落-2.20%，创业板逆势+2.53%', path: 'weekly/2026-W22.html' },
        { date: '2026-W21', type: 'weekly', title: '每周信息总结与投资参考（2026-W21）', summary: '5/19-5/22：英伟达财报+SpaceX IPO，美股续创新高', path: 'weekly/2026-W21.html' },
        { date: '2026-W20', type: 'weekly', title: '投资信息周报｜2026-W20', summary: '5/11-5/15：节后首周调整，美伊局势缓和', path: 'weekly/2026-W20.html' },
        // ---- 日报 ----
        { date: '2026-05-24', type: 'daily', title: '每日信息总结（晚）', summary: '科创50月涨11.47%，SpaceX IPO创纪录', path: 'daily/2026-05-24-evening.html' },
        { date: '2026-05-24', type: 'daily', title: '每日信息总结', summary: '科创50创历史新高1901点后急转直下', path: 'daily/2026-05-24.html' },
        { date: '2026-05-23', type: 'daily', title: '每日信息总结', summary: '全球AI技术大会召开，半导体板块走强', path: 'daily/2026-05-23.html' },
        { date: '2026-05-16', type: 'daily', title: '每日信息总结', summary: '华为提出"τ定律"，预测2031年芯片1.4nm', path: 'daily/2026-05-16.html' },
        { date: '2026-05-07', type: 'daily', title: '每日信息总结', summary: '', path: 'daily/2026-05-07.html' },
        { date: '2026-05-04', type: 'daily', title: '每日信息总结', summary: '五一假期：苹果财报超预期，巴菲特股东大会', path: 'daily/2026-05-04.html' },
        { date: '2026-05-02', type: 'daily', title: '每日信息总结', summary: '', path: 'daily/2026-05-02.html' },
        { date: '2026-04-13', type: 'daily', title: '每日信息总结', summary: '', path: 'daily/2026-04-13.html' }
    ];

    // ---- 渲染指数概览 ----
    // 实际数据通过 neodata-financial-search / westock-data 获取
    // 这里预留接口，后续自动化任务注入实时数据

    // ---- 渲染报告列表 ----
    function renderReports(type, containerId) {
        const container = document.getElementById(containerId);
        const filtered = REPORTS.filter(r => r.type === type);
        
        if (filtered.length === 0) return; // 保留空状态占位

        container.innerHTML = filtered.map(r => `
            <a class="report-card animate" href="${r.path || '#'}">
                <div class="report-card-header">
                    <span class="report-date">${r.date}</span>
                    <span class="report-badge ${r.type}">${
                        r.type === 'daily' ? '日报' : 
                        r.type === 'weekly' ? '周报' : '月报'
                    }</span>
                </div>
                <div class="report-summary">${r.summary}</div>
                ${r.highlights ? `
                <div class="report-highlights">
                    ${r.highlights.map(h => `<span class="report-highlight">${h}</span>`).join('')}
                </div>` : ''}
            </a>
        `).join('');
    }

    // ---- 初始化 ----
    renderReports('monthly', 'monthlyList');
    renderReports('weekly', 'weeklyList');
    renderReports('daily', 'dailyList');

})();
</script>
</body>
</html>
