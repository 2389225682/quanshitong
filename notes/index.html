<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的笔记 | 飞飞的知识库</title>
    <link rel="icon" type="image/png" href="../icons/icon-192.png">
    <link rel="stylesheet" href="../kb-core.css">
    <style>
        /* ========== 容器 ========== */
        .notes-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: var(--kb-safe-top) var(--sp-4) 60px;
        }

        /* ========== 顶栏 ========== */
        .notes-topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: var(--sp-4);
        }

        .notes-back {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--kb-bg-glass);
            border: 1px solid var(--kb-border);
            border-radius: 8px;
            color: var(--kb-text-sec);
            font-size: 13px;
            text-decoration: none;
            transition: var(--kb-transition);
            white-space: nowrap;
        }

        .notes-back:hover {
            background: var(--kb-bg-glass-hover);
            color: var(--kb-text);
        }

        .notes-page-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--kb-text);
        }

        /* ========== 头部 ========== */
        .notes-hero {
            text-align: center;
            padding: var(--sp-6) 0 var(--sp-5);
        }

        .notes-hero-icon {
            font-size: 40px;
            margin-bottom: var(--sp-3);
        }

        .notes-hero h1 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            font-weight: 700;
            color: var(--kb-text);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .notes-hero .sub {
            font-size: 14px;
            color: var(--kb-text-sec);
        }

        /* ========== 搜索 ========== */
        .notes-search-wrap {
            position: relative;
            margin-bottom: var(--sp-4);
        }

        .notes-search-wrap input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: var(--kb-bg-glass);
            border: 1px solid var(--kb-border);
            border-radius: 14px;
            color: var(--kb-text);
            font-size: 14px;
            transition: var(--kb-transition);
            box-sizing: border-box;
            outline: none;
        }

        .notes-search-wrap input:focus {
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.08);
        }

        .notes-search-wrap input::placeholder {
            color: var(--kb-text-muted);
        }

        .notes-search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--kb-text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        /* ========== 分类Tab ========== */
        .notes-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: var(--sp-3);
            margin-bottom: var(--sp-3);
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .notes-tabs::-webkit-scrollbar { display: none; }

        .notes-tab {
            flex-shrink: 0;
            padding: 7px 16px;
            background: var(--kb-bg-glass);
            border: 1px solid var(--kb-border);
            border-radius: 20px;
            color: var(--kb-text-sec);
            font-size: 13px;
            cursor: pointer;
            transition: var(--kb-transition);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            user-select: none;
        }

        .notes-tab:hover {
            background: var(--kb-bg-glass-hover);
            color: var(--kb-text);
        }

        .notes-tab.active {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.4);
            color: #fbbf24;
        }

        .notes-tab .badge {
            font-size: 11px;
            background: rgba(255,255,255,0.08);
            padding: 1px 7px;
            border-radius: 10px;
            color: var(--kb-text-muted);
            transition: var(--kb-transition);
        }

        .notes-tab.active .badge {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        /* ========== 统计栏 ========== */
        .notes-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-2) 0;
            margin-bottom: var(--sp-3);
        }

        .notes-count {
            font-size: 13px;
            color: var(--kb-text-muted);
        }

        .notes-clear {
            font-size: 12px;
            color: var(--kb-text-muted);
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            transition: var(--kb-transition);
        }

        .notes-clear:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.2);
        }

        /* ========== 笔记卡片 ========== */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
        }

        .note-card {
            background: var(--kb-bg-card);
            border: 1px solid var(--kb-border);
            border-radius: 14px;
            padding: var(--sp-4);
            transition: var(--kb-transition);
            animation: noteIn 0.35s ease both;
            position: relative;
        }

        .note-card:hover {
            background: var(--kb-bg-card-hover);
            border-color: rgba(255,255,255,0.08);
        }

        @keyframes noteIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .note-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .tag-finance { background: rgba(16,185,129,0.13); color: #34d399; }
        .tag-history { background: rgba(96,165,250,0.13); color: #60a5fa; }
        .tag-reading { background: rgba(168,85,247,0.13); color: #a78bfa; }
        .tag-life   { background: rgba(251,191,36,0.13); color: #fbbf24; }
        .tag-other  { background: rgba(255,255,255,0.06); color: var(--kb-text-sec); }

        .note-time {
            font-size: 11px;
            color: var(--kb-text-muted);
        }

        .note-text {
            font-size: 14px;
            line-height: 1.75;
            color: var(--kb-text);
            margin-bottom: 12px;
            word-break: break-word;
        }

        .note-source {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--kb-text-muted);
            padding-top: 10px;
            border-top: 1px solid var(--kb-border);
        }

        .note-source a {
            color: var(--kb-text-sec);
            text-decoration: none;
            transition: var(--kb-transition);
        }

        .note-source a:hover {
            color: #60a5fa;
        }

        .note-del {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--kb-text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            transition: var(--kb-transition);
            opacity: 0;
        }

        .note-card:hover .note-del {
            opacity: 1;
        }

        .note-del:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ========== 空状态 ========== */
        .notes-empty {
            text-align: center;
            padding: 60px var(--sp-4);
            color: var(--kb-text-muted);
        }

        .notes-empty-emoji {
            font-size: 52px;
            margin-bottom: var(--sp-4);
            opacity: 0.5;
        }

        .notes-empty-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--kb-text-sec);
            margin-bottom: 8px;
        }

        .notes-empty-desc {
            font-size: 13px;
            line-height: 1.7;
            color: var(--kb-text-muted);
        }

        /* ========== 亮色主题 ========== */
        [data-theme="light"] .notes-back {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.1);
            color: #6b7280;
        }
        [data-theme="light"] .notes-back:hover {
            background: rgba(0,0,0,0.08);
            color: #1f2937;
        }
        [data-theme="light"] .notes-hero h1 { color: #111827; }
        [data-theme="light"] .notes-hero .sub { color: #6b7280; }
        [data-theme="light"] .notes-search-wrap input {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.12);
            color: #111827;
        }
        [data-theme="light"] .notes-tab.active {
            background: rgba(251,191,36,0.15);
            border-color: rgba(251,191,36,0.4);
            color: #92400e;
        }
        [data-theme="light"] .tag-finance { background: rgba(16,185,129,0.1); color: #059669; }
        [data-theme="light"] .tag-history { background: rgba(59,130,246,0.1); color: #2563eb; }
        [data-theme="light"] .tag-reading { background: rgba(168,85,247,0.1); color: #7c3aed; }
        [data-theme="light"] .tag-life   { background: rgba(251,191,36,0.12); color: #92400e; }
        [data-theme="light"] .tag-other  { background: rgba(0,0,0,0.05); color: #6b7280; }
        [data-theme="light"] .note-card {
            background: #fff;
            border-color: rgba(0,0,0,0.08);
        }
        [data-theme="light"] .note-card:hover {
            background: #f9fafb;
            border-color: rgba(0,0,0,0.12);
        }
        [data-theme="light"] .note-text { color: #1f2937; }
        [data-theme="light"] .note-source { border-top-color: rgba(0,0,0,0.08); }
        [data-theme="light"] .note-source a { color: #6b7280; }
        [data-theme="light"] .note-del { color: #9ca3af; }
        [data-theme="light"] .notes-empty-title { color: #374151; }
    </style>
</head>
<body>
    <div class="notes-wrap">
        <!-- 顶栏 -->
        <div class="notes-topbar">
            <a href="../index.html" class="notes-back">&#x2190; 返回</a>
            <span class="notes-page-title">我的笔记</span>
        </div>

        <!-- 头部 -->
        <div class="notes-hero">
            <div class="notes-hero-icon">&#x1F4DD;</div>
            <h1>我的笔记</h1>
            <div class="sub">记录想法，留住灵感</div>
        </div>

        <!-- 搜索 -->
        <div class="notes-search-wrap">
            <span class="notes-search-icon">&#x1F50D;</span>
            <input type="text" id="noteSearchInput" placeholder="搜索笔记内容、来源...">
        </div>

        <!-- 分类Tab -->
        <div class="notes-tabs" id="noteTabs"></div>

        <!-- 工具栏 -->
        <div class="notes-toolbar">
            <span class="notes-count" id="noteCount"></span>
            <button class="notes-clear" id="noteClearBtn" style="display:none">&#x1F5D1; 清空全部</button>
        </div>

        <!-- 笔记列表 -->
        <div class="notes-list" id="noteList"></div>
    </div>

    <script>
    (function(){
        'use strict';
        var KEY='kb-notes';
        var CATS=[
            {v:'all',l:'全部'},{v:'finance',l:'财经想法'},
            {v:'history',l:'历史理解'},{v:'reading',l:'读书笔记'},
            {v:'life',l:'生活感悟'},{v:'other',l:'其他'}
        ];
        var cat='all', q='';

        // 主题同步
        var t=localStorage.getItem('kb-theme');
        if(t==='light') document.documentElement.setAttribute('data-theme','light');

        function get(){ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} }

        function del(id){
            var ns=get().filter(function(n){return n.id!==id});
            localStorage.setItem(KEY,JSON.stringify(ns));
            render();
        }

        function clearAll(){
            if(!confirm('确定清空所有笔记？此操作不可恢复。')) return;
            localStorage.setItem(KEY,'[]');
            render();
        }

        function filter(ns){
            return ns.filter(function(n){
                var mc=cat==='all'||n.category===cat;
                var qq=q.toLowerCase();
                var ms=!qq||(n.text||'').toLowerCase().indexOf(qq)>-1||
                    (n.pageTitle||'').toLowerCase().indexOf(qq)>-1||
                    (n.categoryLabel||'').toLowerCase().indexOf(qq)>-1;
                return mc&&ms;
            });
        }

        function fmtTime(iso){
            try{
                var d=new Date(iso);
                return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+
                    String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+
                    String(d.getMinutes()).padStart(2,'0');
            }catch(e){return iso}
        }

        function esc(s){
            var d=document.createElement('div');
            d.textContent=s;
            return d.innerHTML.replace(/\n/g,'<br>');
        }

        function tagCls(c){ return 'tag-'+(c||'other') }

        function renderTabs(ns){
            var h='';
            CATS.forEach(function(c){
                var cnt=c.v==='all'?ns.length:ns.filter(function(n){return n.category===c.v}).length;
                var ac=c.v===cat?' active':'';
                h+='<button class="notes-tab'+ac+'" data-c="'+c.v+'">'+c.l+
                    '<span class="badge">'+cnt+'</span></button>';
            });
            document.getElementById('noteTabs').innerHTML=h;
            [].forEach.call(document.querySelectorAll('.notes-tab'),function(b){
                b.addEventListener('click',function(){
                    cat=this.getAttribute('data-c');
                    render();
                });
            });
        }

        function renderList(fns){
            var el=document.getElementById('noteList');
            if(!fns.length){
                var em=q?'没有找到匹配的笔记':'还没有笔记';
                var eh=q?'试试其他关键词':'在知识库页面点击右下角 &#x1F4DD; 按钮，随时记录你的想法';
                el.innerHTML='<div class="notes-empty"><div class="notes-empty-emoji">&#x1F4DD;</div>'+
                    '<div class="notes-empty-title">'+em+'</div>'+
                    '<div class="notes-empty-desc">'+eh+'</div></div>';
                return;
            }
            var h='';
            fns.forEach(function(n,i){
                var tc='note-tag '+tagCls(n.category);
                var src=n.pageTitle?'<a href="'+(n.pagePath||'#')+'">'+esc(n.pageTitle)+'</a>':'';
                var sh=src?'<div class="note-source">&#x1F4C4; 来源：'+src+'</div>':'';
                h+='<div class="note-card" style="animation-delay:'+(i*0.06)+'s">'+
                    '<div class="note-card-top">'+
                        '<span class="'+tc+'">'+(n.categoryLabel||'其他')+'</span>'+
                        '<span class="note-time">'+fmtTime(n.createdAt)+'</span>'+
                    '</div>'+
                    '<div class="note-text">'+esc(n.text)+'</div>'+
                    sh+
                    '<button class="note-del" data-id="'+n.id+'" title="删除">&#x1F5D1;</button>'+
                '</div>';
            });
            el.innerHTML=h;
            [].forEach.call(document.querySelectorAll('.note-del'),function(b){
                b.addEventListener('click',function(){ del(this.getAttribute('data-id')) });
            });
        }

        function render(){
            var ns=get(), fns=filter(ns);
            renderTabs(ns);
            renderList(fns);
            document.getElementById('noteCount').textContent=
                '共 '+ns.length+' 条'+(fns.length!==ns.length?'，显示 '+fns.length+' 条':'');
            document.getElementById('noteClearBtn').style.display=ns.length?'':'none';
        }

        document.getElementById('noteSearchInput').addEventListener('input',function(){
            q=this.value.trim();
            render();
        });
        document.getElementById('noteClearBtn').addEventListener('click',clearAll);
        document.addEventListener('keydown',function(e){
            if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('noteSearchInput').focus();}
            if(e.key==='Escape'){document.getElementById('noteSearchInput').value='';q='';render();}
        });
        render();
    })();
    </script>
</body>
</html>
