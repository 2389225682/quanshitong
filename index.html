<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0b1a">
    <title>飞飞的知识库</title>
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="kb-core.css">
    <link rel="stylesheet" href="kb-article.css?v=3">
    <script src="kb-registry.js"></script>
</head>
<body>
<div class="kb-app" id="app">

    <!-- Header -->
    <header class="kb-header">
        <h1 class="kb-header-title">🧠 飞飞的知识库</h1>
        <p class="kb-header-subtitle">理解客观世界 · 洞察主观人心</p>
        <p class="kb-header-motto">不骗 · 不捧 · 不装 · 不瞒</p>
    </header>

    <!-- 搜索 -->
    <div class="kb-search">
        <span class="kb-search-icon">🔍</span>
        <input type="search" id="searchInput" placeholder="搜索模块..." autocomplete="off">
        <button class="kb-search-clear" id="searchClear">✕</button>
    </div>

    <!-- 分类 Tab -->
    <div class="kb-tabs" id="categoryTabs">
        <button class="kb-tab active" data-cat="all">
            <span class="tab-icon">✦</span>全部
        </button>
    </div>

    <!-- 内容区 -->
    <main id="moduleList"></main>

    <!-- Footer -->
    <footer class="kb-footer">
        队长为飞飞整理 · 2026年6月
    </footer>
</div>

<script>
(function() {
    'use strict';

    // ---- 状态 ----
    let currentCat = 'all';
    let searchQuery = '';

    // ---- DOM ----
    const listEl = document.getElementById('moduleList');
    const tabsEl = document.getElementById('categoryTabs');
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    // ---- 初始化分类 Tab ----
    function initTabs() {
        KB_CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'kb-tab';
            btn.dataset.cat = cat.id;
            btn.innerHTML = `<span class="tab-icon">${cat.icon}</span>${cat.name}`;
            tabsEl.appendChild(btn);
        });

        tabsEl.addEventListener('click', e => {
            const tab = e.target.closest('.kb-tab');
            if (!tab) return;
            tabsEl.querySelectorAll('.kb-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCat = tab.dataset.cat;
            render();
        });
    }

    // ---- 颜色映射 ----
    function colorKey(mod) {
        const map = {
            '#c9a227': 'gold',
            '#3498db': 'blue',
            '#9b59b6': 'purple',
            '#e74c3c': 'red',
            '#1abc9c': 'teal',
            '#f39c12': 'orange'
        };
        return map[mod.color] || 'gold';
    }

    // ---- 渲染封面占位 ----
    function renderCover(mod) {
        const ck = colorKey(mod);
        if (mod.cover) {
            return `<img class="kb-card-cover" src="${mod.cover}" alt="${mod.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'kb-card-cover-placeholder\\' data-color=\\'${ck}\\' style=\\'background:linear-gradient(135deg,rgba(${mod.colorRgb},0.15),rgba(${mod.colorRgb},0.05))\\'>${mod.icon}</div>'">`;
        }
        return `<div class="kb-card-cover-placeholder" style="background:linear-gradient(135deg,rgba(${mod.colorRgb},0.15),rgba(${mod.colorRgb},0.05))">${mod.icon}</div>`;
    }

    // ---- 渲染大卡片（全宽，有封面） ----
    function renderLargeCard(mod) {
        const ck = colorKey(mod);
        const tagsHtml = mod.tags.map(t => `<span class="kb-card-tag">${t}</span>`).join('');
        const statsHtml = mod.stats.map(s => 
            `<div class="kb-card-stat"><div class="kb-card-stat-value">${s.value}</div><div class="kb-card-stat-label">${s.label}</div></div>`
        ).join('');

        return `
        <a class="kb-card kb-animate" href="${mod.path}" data-color="${ck}" data-id="${mod.id}">
            ${renderCover(mod)}
            <div class="kb-card-body">
                <div class="kb-card-name">${mod.name}</div>
                <div class="kb-card-subtitle">${mod.subtitle}</div>
                <div class="kb-card-desc">${mod.description}</div>
                <div class="kb-card-tags">${tagsHtml}</div>
                ${mod.stats.length ? `<div class="kb-card-stats">${statsHtml}</div>` : ''}
                <span class="kb-card-arrow">→</span>
            </div>
        </a>`;
    }

    // ---- 渲染小卡片（双列） ----
    function renderSmallCard(mod) {
        const ck = colorKey(mod);
        const tagsHtml = mod.tags.slice(0, 2).map(t => `<span class="card-tag">${t}</span>`).join('');

        return `
        <a class="kb-card-small kb-animate ${mod.status === 'coming' ? 'kb-card-coming' : ''}" 
           href="${mod.path}" data-color="${ck}" data-id="${mod.id}">
            <div class="card-icon">${mod.icon}</div>
            <div class="card-name">${mod.name}</div>
            <div class="card-subtitle">${mod.subtitle}</div>
            <div class="card-tags">${tagsHtml}</div>
            ${mod.status === 'coming' ? '<div class="coming-badge">即将上线</div>' : ''}
        </a>`;
    }

    // ---- 主渲染 ----
    function render() {
        let modules = KB_MODULES;

        // 搜索过滤
        if (searchQuery) {
            modules = searchModules(searchQuery);
        }

        // 分类过滤
        if (currentCat !== 'all') {
            modules = modules.filter(m => m.category === currentCat);
        }

        if (modules.length === 0) {
            listEl.innerHTML = `
                <div class="kb-empty">
                    <div class="kb-empty-icon">🔍</div>
                    <div class="kb-empty-text">没有找到匹配的模块</div>
                </div>`;
            return;
        }

        let html = '';

        if (searchQuery) {
            // 搜索模式：全部大卡片
            html += '<div class="kb-section">';
            modules.forEach(mod => { html += renderLargeCard(mod); });
            html += '</div>';
        } else if (currentCat !== 'all') {
            // 单分类模式
            const cat = KB_CATEGORIES.find(c => c.id === currentCat);
            const active = modules.filter(m => m.status === 'active');
            const coming = modules.filter(m => m.status === 'coming');

            html += '<div class="kb-section">';
            active.forEach(mod => { html += renderLargeCard(mod); });
            html += '</div>';

            if (coming.length) {
                html += '<div class="kb-section">';
                html += '<div class="kb-section-title">即将上线</div>';
                html += '<div class="kb-grid">';
                coming.forEach(mod => { html += renderSmallCard(mod); });
                html += '</div></div>';
            }
        } else {
            // 全部模式：按分类分组
            KB_CATEGORIES.forEach(cat => {
                const catModules = modules.filter(m => m.category === cat.id);
                if (catModules.length === 0) return;

                const active = catModules.filter(m => m.status === 'active');
                const coming = catModules.filter(m => m.status === 'coming');

                html += '<div class="kb-section">';
                html += `<div class="kb-section-title">${cat.icon} ${cat.name}</div>`;

                if (active.length === 1) {
                    // 单模块用大卡片
                    html += renderLargeCard(active[0]);
                } else if (active.length >= 2) {
                    // 多模块用大卡片 + 小卡片混合
                    html += renderLargeCard(active[0]);
                    if (active.length > 1) {
                        html += '<div class="kb-grid">';
                        for (let i = 1; i < active.length; i++) {
                            html += renderSmallCard(active[i]);
                        }
                        html += '</div>';
                    }
                }

                if (coming.length) {
                    html += '<div class="kb-grid" style="margin-top:var(--sp-3)">';
                    coming.forEach(mod => { html += renderSmallCard(mod); });
                    html += '</div>';
                }

                html += '</div>';
            });
        }

        listEl.innerHTML = html;
    }

    // ---- 搜索 ----
    let searchTimer = null;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchQuery = this.value.trim();
        searchClear.classList.toggle('visible', searchQuery.length > 0);
        searchTimer = setTimeout(render, 200);
    });

    searchClear.addEventListener('click', function() {
        searchInput.value = '';
        searchQuery = '';
        this.classList.remove('visible');
        render();
        searchInput.focus();
    });

    // ---- 启动 ----
    initTabs();
    render();

})();
</script>
<script src="kb-article.js?v=3"></script>
</body>
</html>
